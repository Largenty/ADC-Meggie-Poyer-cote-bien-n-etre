            label_singular: "Étape"
            widget: list
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - { name: num, label: "Numéro (ex. 01)", widget: string }
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Texte", widget: text }
          - name: gift
            label: "Étapes — page Bon cadeau"
            label_singular: "Étape"
            widget: list
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - { name: num, label: "Numéro (ex. 01)", widget: string }
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Texte", widget: text }

